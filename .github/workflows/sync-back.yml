name: Automated Release Sync-Down

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-working:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_BOT_TOKEN }}

      - name: Configure Git Author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"

      - name: Merge Main down to Working
        run: |
          git checkout working
          git merge origin/main --no-ff -m "merge: automated sync-down from main post-release"
          git push origin working
